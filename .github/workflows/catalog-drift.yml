name: Oracle catalog drift

on:
  schedule:
    - cron: '23 13 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  compare:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run catalog:sync
      - name: Report generated catalog drift
        run: git diff --exit-code -- src/features/infinity/oracleParameterCatalog.generated.ts
