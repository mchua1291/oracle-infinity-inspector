name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm audit --omit=dev
      - run: npm run format:check
      - run: npm run typecheck
      - run: npm test
      - run: npm run lint
      - run: npm run build
      - run: npm run verify:dist
      - uses: actions/upload-artifact@v4
        with:
          name: oracle-infinity-inspector-dist
          path: dist
          if-no-files-found: error
