name: Bug report
description: Report a reproducible problem using sanitized evidence only.
title: '[Bug]: '
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Do not include real client payloads, account GUIDs, identifiers, email addresses, private URLs, credentials, or exported QA reports.
  - type: input
    id: version
    attributes:
      label: Extension version
      placeholder: 0.2.0
    validations:
      required: true
  - type: input
    id: browser
    attributes:
      label: Browser and version
      placeholder: Microsoft Edge 140
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Sanitized reproduction steps
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: checkboxes
    id: safety
    attributes:
      label: Data-safety confirmation
      options:
        - label: I removed client data, private URLs, identifiers, credentials, and raw QA exports.
          required: true
